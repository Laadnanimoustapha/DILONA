name: Sync Backend to Hugging Face Spaces

on:
  push:
    branches: [ "main" ]
    paths:
      - "backend/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Create a temporary deploy folder
          mkdir -p /tmp/hf_deploy
          
          # Copy only the files inside backend/ to the root of hf_deploy
          cp -r backend/* /tmp/hf_deploy/
          
          # Navigate to the deploy folder
          cd /tmp/hf_deploy
          
          # Initialize git and commit files
          git init
          git lfs install
          git lfs track "*.ttf"
          git checkout -b main
          git add .
          git commit -m "Sync DILONA backend to Hugging Face Spaces"
          
          # Push to the Hugging Face Space repository using your HF token
          git remote add origin https://oauth2:$HF_TOKEN@huggingface.co/spaces/dfifa/stage-backend
          git push -f origin main
