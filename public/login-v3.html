<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - النظام الوطني للحالة المدنية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --clr-primary: #0A4D3C;
      --clr-primary-hover: #0C5A46;
      --clr-surface: #FFFFFF;
      --clr-text-primary: #1A1A1A;
      --clr-text-secondary: #6B6355;
      --clr-accent-gold: #D4AF37;
      --ff-primary: 'Cairo', 'Tajawal', 'Segoe UI', system-ui, sans-serif;
      --radius-sm: 2px;
      --transition-fast: 200ms ease-in-out;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html { scrollbar-width: none; }
    ::-webkit-scrollbar { width: 0; background: transparent; }
    
    body {
      font-family: var(--ff-primary);
      color: var(--clr-text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #FAF8F2;
      background-image: url('log-in-backkgrund%20image%20(3).png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      position: relative;
    }
    .login-container {
      position: relative;
      z-index: 1;
      background: transparent;
      padding: 48px 40px;
      border-radius: var(--radius-sm);
      width: 100%;
      max-width: 440px;
      border: 1px solid var(--clr-accent-gold);
    }
    
    .login-container::before {
      content: "";
      display: block;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--clr-primary), var(--clr-accent-gold));
    }
    
    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }
    
    .login-header h1 {
      color: var(--clr-primary);
      font-size: 22px;
      font-weight: 700;
      line-height: 1.35;
      margin-bottom: 4px;
    }
    
    .login-header p {
      color: var(--clr-text-secondary);
      font-size: 14px;
      font-weight: 500;
    }
    
    .divider {
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--clr-accent-gold), transparent);
      margin: 16px auto 0;
      border: none;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .form-input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #D4C9B7;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-family: inherit;
      color: var(--clr-text-primary);
      background-color: rgba(255, 255, 255, 0.96);
      min-height: 38px;
      box-shadow: inset 0 1px 2px rgba(27, 54, 93, 0.05);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast), background-color var(--transition-fast);
    }
    
    .form-input:focus {
      border-color: var(--clr-primary);
      outline: none;
      background-color: #FFFFFF;
      box-shadow: inset 0 1px 2px rgba(27, 54, 93, 0.05), 0 0 0 2px rgba(10, 77, 60, 0.16);
    }
    
    .btn-submit {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 24px;
      min-height: 44px;
      background-color: var(--clr-primary);
      color: #FFFFFF;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: opacity var(--transition-fast);
      margin-top: 16px;
    }
    
    .btn-submit:hover {
      opacity: 0.9;
    }

    .error-msg {
      color: #C0392B;
      font-size: 13px;
      margin-top: 6px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <h1>تسجيل الدخول</h1>
      <p>النظام الوطني للحالة المدنية</p>
      <div class="divider"></div>
    </div>
    
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="username">اسم المستخدم</label>
        <input class="form-input" type="text" id="username" placeholder="أدخل اسم المستخدم" required>
      </div>
      
      <div class="form-group">
        <label class="form-label" for="password">كلمة المرور</label>
        <input class="form-input" type="password" id="password" placeholder="أدخل كلمة المرور" required>
        <p class="error-msg" id="errorMsg">بيانات الدخول غير صحيحة</p>
      </div>
      
      <button type="submit" class="btn-submit">دخول</button>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;
      
      if(user && pass) {
        const btn = document.querySelector('.btn-submit');
        const originalText = btn.textContent;
        btn.textContent = 'جاري التحقق...';
        btn.disabled = true;
        
        setTimeout(() => {
          btn.textContent = originalText;
          btn.disabled = false;
          window.location.href = '/'; // Redirect to dashboard
        }, 1500);
      }
    });
  </script>
</body>
</html>
